version: '3.8'

services:
  api:
    build: .
    container_name: student-herald-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health/ready"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs
    networks:
      - student-herald-network

networks:
  student-herald-network:
    driver: bridge
